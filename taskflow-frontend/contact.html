<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <title>Contact</title>

</head>


<body>


<button class="contact-btn" id="openContact">

    <span>
        Let's Work Together
    </span>

    <i class="fa-solid fa-paper-plane"></i>

</button>



<div class="contact-popup" id="contactPopup">

<div class="contact-box">


<span class="close-contact" id="closeContact">

    &times;

</span>


<img src="public/Nofi.jpeg" class="contact-image" alt="Nafi">


<h2>
    Send Me A Message
</h2>


        <form id="contactForm">


            <input 
            type="text"
            name="name"
            placeholder="Your Name"
            required>



            <input 
            type="email"
            name="email"
            placeholder="Your Email"
            required>



            <input 
            type="text"
            name="company"
            placeholder="Company (Optional)">



            <textarea
            name="message"
            placeholder="Your Message"
            required></textarea>



            <button type="submit" class="btn">

                <i class="fa-solid fa-paper-plane"></i>

                Send Message

            </button>


        </form>


    </div>


</div>



<script src="script.js"></script>


</body>

</html>
